name: Build All Platforms

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Make gradle wrapper executable
      working-directory: ./lab9_1
      run: chmod +x gradlew

    - name: Build Android App
      working-directory: ./lab9_1
      run: ./gradlew :androidApp:assembleDebug --no-daemon

    - name: Build Desktop App (Linux/JVM)
      working-directory: ./lab9_1
      run: ./gradlew :desktopApp:assemble --no-daemon

    - name: Build Web App (Wasm/JS)
      working-directory: ./lab9_1
      run: ./gradlew :webApp:compileKotlinWasmJs --no-daemon

    - name: Build iOS Target
      working-directory: ./lab9_1
      run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 --no-daemon
